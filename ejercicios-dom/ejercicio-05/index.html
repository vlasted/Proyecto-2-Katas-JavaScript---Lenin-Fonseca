<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Ejercicio 5</title>
  <script src="script.js" defer></script>
  <style>
    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
      font-family: Arial, sans-serif;
    }

    body {
      background-color: #111827;
      color: #f9fafb;
      min-height: 100vh;
    }

    header {
      padding: 32px 24px 16px;
      text-align: center;
    }

    header h1 {
      font-size: 32px;
      margin-bottom: 8px;
    }

    header p {
      color: #9ca3af;
    }

    main {
      padding: 24px;
      max-width: 900px;
      margin: 0 auto;
    }

    ul {
      list-style: none;
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(220px, 1fr));
      gap: 16px;
    }

    li {
      background-color: #1f2937;
      border: 1px solid #374151;
      border-radius: 12px;
      padding: 20px;
      font-size: 18px;
      text-align: center;
      box-shadow: 0 6px 20px rgba(0, 0, 0, 0.2);
    }
  </style>
</head>
<body>
  <header>
    <h1>Albums Collection</h1>
    <p>Lista dinámica de albums</p>
  </header>

  <main>
    <ul id="albums-list"></ul>
  </main>
</body>
</html>
